<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面 - HTML可视化编辑器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.6;
            color: #333;
        }
        h1 { color: #0066cc; border-bottom: 2px solid #0066cc; padding-bottom: 10px; }
        h2 { color: #444; margin-top: 30px; }
        p { margin: 15px 0; }
        .highlight { background: #fff3cd; padding: 15px; border-radius: 8px; border-left: 4px solid #ffc107; }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 15px 0; }
        ul { padding-left: 20px; }
        li { margin: 8px 0; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>欢迎使用 HTML 可视化编辑器</h1>
    
    <p>这是一个测试页面，您可以直接点击这里的文字进行编辑。</p>
    
    <h2>功能说明</h2>
    
    <div class="highlight">
        <p><strong>提示：</strong>点击顶部工具栏的 "Edit Mode" 按钮进入编辑模式，然后点击任意文本即可修改。</p>
    </div>
    
    <h2>主要特性</h2>
    
    <ul>
        <li>直接点击文字即可编辑</li>
        <li>支持标题、段落、列表等元素</li>
        <li>图片可点击替换</li>
        <li>一键保存修改</li>
    </ul>
    
    <p>更多示例文本：<a href="https://code.visualstudio.com">VSCode 官网</a> 提供了丰富的扩展支持。</p>
    
    <h2>待办事项</h2>
    
    <ul>
        <li>完成项目配置</li>
        <li>测试编辑功能</li>
        <li>发布扩展</li>
    </ul>
</body>
</html>
